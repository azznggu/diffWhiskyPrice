<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>위스키 가격 비교 | 창이공항 vs 일본</title>
  <meta name="description" content="싱가포르 창이공항 면세점 위스키 가격과 일본 시중 최저가를 엔화 기준으로 비교합니다." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥃</text></svg>" />
  <style>
    :root {
      --bg: #0c0c10;
      --surface: #15151c;
      --card: #1c1c28;
      --border: #2a2a3a;
      --amber: #d4a020;
      --amber-light: #f0c850;
      --amber-dim: rgba(212,160,32,0.12);
      --green: #3dba78;
      --green-dim: rgba(61,186,120,0.10);
      --red: #e25555;
      --red-dim: rgba(226,85,85,0.10);
      --blue: #6ea8fe;
      --text: #eae6da;
      --sub: #9090a0;
      --muted: #55556a;
      --r: 12px;
      --rs: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* === HEADER === */
    header {
      background: linear-gradient(135deg, #1a1308 0%, var(--bg) 70%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-row { display: flex; align-items: center; justify-content: space-between; }
    .app-t { font-size: 17px; font-weight: 700; color: var(--amber-light); }
    .app-st { font-size: 11px; color: var(--sub); margin-top: 1px; }
    .rate-pill {
      background: var(--amber-dim); border: 1px solid rgba(212,160,32,0.4);
      border-radius: 20px; padding: 5px 12px; text-align: center; flex-shrink: 0;
    }
    .rate-v { font-size: 12px; font-weight: 700; color: var(--amber-light); white-space: nowrap; }
    .rate-d { font-size: 9px; color: var(--muted); display: block; margin-top: 1px; }

    /* === DATA INFO BAR === */
    .info-bar {
      display: flex; gap: 6px; padding: 8px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap;
      font-size: 10px; color: var(--muted);
    }
    .info-tag {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 2px 8px; white-space: nowrap;
    }

    /* === STATS === */
    .stats { display: flex; gap: 6px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
    .stats::-webkit-scrollbar { display: none; }
    .st-item { flex-shrink: 0; text-align: center; padding: 6px 12px; background: var(--card); border-radius: var(--rs); border: 1px solid var(--border); }
    .st-v { font-size: 13px; font-weight: 700; color: var(--amber-light); }
    .st-l { font-size: 9px; color: var(--muted); margin-top: 2px; }

    /* === CONTROLS === */
    .ctrl { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 62px; z-index: 90; }
    .search-w { position: relative; margin-bottom: 8px; }
    .search-w::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }
    #search {
      width: 100%; padding: 8px 12px 8px 32px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--rs);
      color: var(--text); font-size: 14px; outline: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--amber); }

    .filter-r { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
    .filter-r::-webkit-scrollbar { display: none; }
    .fbtn {
      flex-shrink: 0; padding: 4px 10px; border-radius: 16px;
      border: 1px solid var(--border); background: transparent;
      color: var(--sub); font-size: 11px; font-weight: 500; cursor: pointer;
    }
    .fbtn.on { background: var(--amber); border-color: var(--amber); color: #0c0c10; font-weight: 700; }

    .sort-r { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .sort-r label { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    #sort {
      flex: 1; padding: 6px 8px; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rs); color: var(--text); font-size: 12px; outline: none;
    }
    .tog-w { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .tog-l { font-size: 10px; color: var(--sub); }
    .tog { position: relative; width: 32px; height: 18px; cursor: pointer; display: inline-block; }
    .tog input { display: none; }
    .tog span {
      position: absolute; inset: 0; background: var(--border); border-radius: 18px; transition: background .2s;
    }
    .tog span::after {
      content: ''; position: absolute; width: 12px; height: 12px;
      background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s;
    }
    .tog input:checked+span { background: var(--green); }
    .tog input:checked+span::after { transform: translateX(14px); }

    /* === COMPARE MODE TOGGLE === */
    .cmp-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .cmp-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 12px;
      border: 1px solid var(--border); background: transparent;
      color: var(--sub); cursor: pointer;
    }
    .cmp-btn.on { background: var(--blue); border-color: var(--blue); color: #0c0c10; font-weight: 600; }

    /* === LIST === */
    .list-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px 4px; font-size: 10px; color: var(--muted);
    }
    .legend { display: flex; gap: 12px; }
    .lg-i { display: flex; align-items: center; gap: 3px; }
    .lg-d { width: 7px; height: 7px; border-radius: 50%; }
    .lg-d.g { background: var(--green); }
    .lg-d.r { background: var(--red); }

    #list { padding: 0 12px 100px; }

    /* === CARD === */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px; margin-bottom: 8px;
    }
    .c-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .c-brand { font-size: 9px; color: var(--amber); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .c-name { font-size: 14px; font-weight: 600; line-height: 1.3; margin-top: 1px; }
    .c-name-kr { font-size: 11px; color: var(--sub); margin-top: 1px; }
    .c-vol { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .c-vol .vol-diff { color: var(--amber); font-weight: 500; }

    .badge {
      flex-shrink: 0; padding: 4px 10px; border-radius: 16px;
      font-size: 12px; font-weight: 700; text-align: center; line-height: 1.3;
    }
    .badge.g { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,186,120,0.25); }
    .badge.r { background: var(--red-dim); color: var(--red); border: 1px solid rgba(226,85,85,0.25); }
    .badge.na { background: var(--card); color: var(--muted); border: 1px solid var(--border); font-size: 10px; }
    .badge-pct { font-size: 9px; display: block; opacity: .8; margin-top: 1px; }

    .price-g { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .p-cell { background: var(--surface); border-radius: var(--rs); padding: 7px 6px; text-align: center; }
    .p-label { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }
    .p-val { font-size: 13px; font-weight: 700; }
    .p-val.changi { color: var(--amber-light); }
    .p-val.japan { color: var(--blue); }
    .p-val.pos { color: var(--green); }
    .p-val.neg { color: var(--red); }
    .p-val.na { color: var(--muted); font-size: 11px; }
    .p-sub { font-size: 8px; color: var(--muted); margin-top: 2px; }
    .p-sub.per-ml { color: var(--sub); font-weight: 500; }

    .c-note { margin-top: 7px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 6px; }

    /* === LOADING === */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13px; }
    .empty .em { font-size: 36px; margin-bottom: 10px; }

    .toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--amber); color: var(--amber-light);
      padding: 8px 18px; border-radius: 18px; font-size: 11px; font-weight: 500;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 360px) {
      .price-g { grid-template-columns: 1fr 1fr; }
      .price-g .p-cell:last-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-row">
    <div>
      <div class="app-t">🥃 위스키 가격비교</div>
      <div class="app-st">창이공항 면세점 vs 일본 시중 최저가 (엔화 기준)</div>
    </div>
    <div class="rate-pill">
      <div class="rate-v" id="rateV">로딩...</div>
      <span class="rate-d" id="rateD"></span>
    </div>
  </div>
</header>

<div class="info-bar" id="infoBar">
  <span class="info-tag">🛫 창이: <span id="srcChangi">—</span></span>
  <span class="info-tag">🗾 일본: <span id="srcJapan">—</span></span>
  <span class="info-tag">📅 갱신: <span id="srcDate">—</span></span>
</div>

<div class="stats">
  <div class="st-item"><div class="st-v" id="s-cnt">—</div><div class="st-l">비교 가능</div></div>
  <div class="st-item"><div class="st-v" id="s-win">—</div><div class="st-l">창이 저렴</div></div>
  <div class="st-item"><div class="st-v" id="s-best">—</div><div class="st-l">최대 절약(¥)</div></div>
  <div class="st-item"><div class="st-v" id="s-bpct">—</div><div class="st-l">최대 절약(%)</div></div>
</div>

<div class="ctrl">
  <div class="search-w"><input type="search" id="search" placeholder="위스키 이름 · 브랜드 검색..." autocomplete="off"/></div>
  <div class="filter-r" id="filters">
    <button class="fbtn on" data-c="all">전체</button>
    <button class="fbtn" data-c="islay">🌊 아일라</button>
    <button class="fbtn" data-c="speyside">🏔 스페이사이드</button>
    <button class="fbtn" data-c="island,highland">🏝 아일랜드/하이랜드</button>
    <button class="fbtn" data-c="irish">🇮🇪 아이리시</button>
  </div>
  <div class="sort-r">
    <label>정렬:</label>
    <select id="sort">
      <option value="save-desc">절약금액 높은순</option>
      <option value="save-pct">절약률 높은순</option>
      <option value="name">이름순</option>
      <option value="changi-asc">창이가격 낮은순</option>
      <option value="japan-asc">일본가격 낮은순</option>
    </select>
    <div class="tog-w">
      <span class="tog-l">절약만</span>
      <label class="tog"><input type="checkbox" id="onlySave"/><span></span></label>
    </div>
  </div>
  <div class="cmp-row">
    <button class="cmp-btn on" id="cmpTotal">총액 비교</button>
    <button class="cmp-btn" id="cmpMl">ml당 비교</button>
    <span style="font-size:9px;color:var(--muted);">※ 용량 다를 때 ml당 비교 추천</span>
  </div>
</div>

<div class="list-hdr">
  <div class="legend">
    <span class="lg-i"><span class="lg-d g"></span>창이 저렴</span>
    <span class="lg-i"><span class="lg-d r"></span>일본 저렴</span>
  </div>
  <span id="listCnt">—</span>
</div>

<div id="list">
  <div class="loading"><div class="spinner"></div>가격 정보 불러오는 중...</div>
</div>
<div class="toast" id="toast"></div>

<script>
let products = [], rate = null, cat = 'all', q = '', srt = 'save-desc', onlySave = false, perMl = false;

const $ = id => document.getElementById(id);
const fmt = (n, d=0) => n.toLocaleString('ko-KR', {maximumFractionDigits:d, minimumFractionDigits:d});

function toast(m) { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

async function loadRate() {
  try {
    const r = await (await fetch('/.netlify/functions/exchange-rate')).json();
    rate = r.rate;
    $('rateV').textContent = `1 SGD = ¥${fmt(r.rate,2)}`;
    $('rateD').textContent = r.fallback ? '※ 대체값' : r.date;
    if (r.fallback) toast('⚠️ 환율 대체값 사용 중');
  } catch(e) {
    rate = 112;
    $('rateV').textContent = '1 SGD = ¥112.00';
    $('rateD').textContent = '※ 대체값';
    toast('⚠️ 환율 조회 실패');
  }
  render();
}

async function loadData() {
  try {
    const d = await (await fetch('/data.json')).json();
    products = d.products;
    $('srcChangi').textContent = d.meta.changiSource;
    $('srcJapan').textContent = d.meta.japanSource;
    $('srcDate').textContent = d.meta.lastUpdated;
  } catch(e) {
    $('list').innerHTML = '<div class="empty"><div class="em">⚠️</div>데이터 로드 실패. 새로고침하세요.</div>';
  }
}

function calc(p) {
  if (!rate || !p.changi.available || !p.changi.priceSGD) return null;
  const cJpy = p.changi.priceSGD * rate;
  const jJpy = p.japan.totalJPY || p.japan.priceJPY; // 배송료 포함 총액 우선
  const cVol = p.changi.volumeML;
  const jVol = p.japan.volumeML;

  if (perMl) {
    const cPerMl = cJpy / cVol;
    const jPerMl = jJpy / jVol;
    const diff = jPerMl - cPerMl;
    const pct = (diff / jPerMl) * 100;
    return { changiJPY: cJpy, diff: diff * jVol, diffPerMl: diff, pct, cPerMl, jPerMl, mode: 'ml' };
  } else {
    const diff = jJpy - cJpy;
    const pct = (diff / jJpy) * 100;
    return { changiJPY: cJpy, diff, pct, mode: 'total' };
  }
}

function filtered() {
  let list = products.filter(p => {
    if (cat !== 'all' && !cat.split(',').includes(p.category)) return false;
    if (q) {
      const s = q.toLowerCase();
      if (!p.name.toLowerCase().includes(s) && !p.brand.toLowerCase().includes(s) && !(p.nameKR||'').includes(s)) return false;
    }
    if (onlySave) { const d=calc(p); if(!d||d.diff<=0) return false; }
    return true;
  });

  const sf = {
    'save-desc': (a,b) => ((calc(b)||{diff:-Infinity}).diff) - ((calc(a)||{diff:-Infinity}).diff),
    'save-pct': (a,b) => ((calc(b)||{pct:-Infinity}).pct) - ((calc(a)||{pct:-Infinity}).pct),
    'name': (a,b) => a.name.localeCompare(b.name),
    'changi-asc': (a,b) => (a.changi.priceSGD||9999) - (b.changi.priceSGD||9999),
    'japan-asc': (a,b) => a.japan.priceJPY - b.japan.priceJPY,
  };
  list.sort(sf[srt] || sf['save-desc']);
  return list;
}

function stats(list) {
  if (!rate) return;
  const comparable = list.filter(p => p.changi.available && p.changi.priceSGD);
  const diffs = comparable.map(calc).filter(Boolean);
  const wins = diffs.filter(d => d.diff > 0);
  const losses = diffs.filter(d => d.diff < 0);
  const maxSav = diffs.reduce((m,d) => d.diff>m?d.diff:m, -Infinity);
  const maxPct = diffs.reduce((m,d) => d.pct>m?d.pct:m, -Infinity);
  const minLoss = losses.length ? losses.reduce((m,d) => Math.abs(d.diff)<Math.abs(m.diff)?d:m) : null;

  $('s-cnt').textContent = comparable.length + '종';
  $('s-win').textContent = wins.length + '종';
  if (maxSav > 0) {
    $('s-best').textContent = '¥'+fmt(Math.round(maxSav));
    $('s-bpct').textContent = fmt(maxPct,1)+'%';
  } else if (minLoss) {
    $('s-best').textContent = '¥'+fmt(Math.round(Math.abs(minLoss.diff)));
    $('s-best').parentElement.querySelector('.st-l').textContent = '최소 차이(¥)';
    $('s-bpct').textContent = fmt(Math.abs(minLoss.pct),1)+'%';
    $('s-bpct').parentElement.querySelector('.st-l').textContent = '최소 차이(%)';
  } else {
    $('s-best').textContent = '-';
    $('s-bpct').textContent = '-';
  }
  $('listCnt').textContent = list.length + '개';
}

function card(p) {
  const d = calc(p);
  const ok = d !== null;
  const win = ok && d.diff > 0;
  const ce = { islay:'🌊', speyside:'🏔', island:'🏝', highland:'⛰️', irish:'🇮🇪' }[p.category]||'';
  const volDiff = p.changi.volumeML !== p.japan.volumeML;

  let badgeHtml = '';
  if (!p.changi.available) {
    badgeHtml = '<div class="badge na">창이 미판매</div>';
  } else if (ok) {
    badgeHtml = `<div class="badge ${win?'g':'r'}">
      ${win ? '¥'+fmt(Math.round(d.diff))+' 절약' : '¥'+fmt(Math.round(-d.diff))+' 비쌈'}
      <span class="badge-pct">${win?'▼':'▲'}${Math.abs(d.pct).toFixed(1)}%${d.mode==='ml'?' (ml당)':''}</span>
    </div>`;
  }

  const changiJpyStr = ok ? '≈ ¥' + fmt(Math.round(d.changiJPY)) : '';
  const changiPerMl = ok ? '¥' + fmt(d.changiJPY / p.changi.volumeML, 1) + '/ml' : '';
  const japanTotal = p.japan.totalJPY || p.japan.priceJPY;
  const japanPerMl = '¥' + fmt(japanTotal / p.japan.volumeML, 1) + '/ml';

  const diffHtml = ok
    ? `<div class="p-val ${win?'pos':'neg'}">${win?'▼':'▲'} ¥${fmt(Math.round(Math.abs(d.diff)))}</div>
       <div class="p-sub">${win?'창이가 저렴':'일본이 저렴'}</div>`
    : '<div class="p-val na">비교 불가</div>';

  const notes = [];
  if (p.changi.notes) notes.push('🛫 ' + p.changi.notes);
  if (volDiff && p.changi.available) notes.push('⚠️ 용량 다름 → ml당 비교 추천');
  if (p.japan.productTitle) notes.push('🗾 ' + p.japan.productTitle);
  const noteHtml = notes.length ? `<div class="c-note">${notes.join('<br>')}</div>` : '';

  return `<div class="card">
    <div class="c-top">
      <div>
        <div class="c-brand">${ce} ${p.brand}</div>
        <div class="c-name">${p.name}</div>
        ${p.nameKR ? `<div class="c-name-kr">${p.nameKR}</div>` : ''}
        <div class="c-vol">
          🛫 ${p.changi.volumeML}ml ${volDiff ? `<span class="vol-diff">≠</span> 🗾 ${p.japan.volumeML}ml` : `/ 🗾 ${p.japan.volumeML}ml`}
        </div>
      </div>
      ${badgeHtml}
    </div>
    <div class="price-g">
      <div class="p-cell">
        <div class="p-label">🛫 창이 (SGD)</div>
        ${p.changi.available && p.changi.priceSGD
          ? `<div class="p-val changi">S$${fmt(p.changi.priceSGD)}</div>
             <div class="p-sub">${changiJpyStr}</div>
             ${perMl ? `<div class="p-sub per-ml">${changiPerMl}</div>` : ''}`
          : '<div class="p-val na">미판매</div>'}
      </div>
      <div class="p-cell">
        <div class="p-label">🗾 일본 최저가${p.japan.shippingJPY ? ' (送料込)' : ''}</div>
        <div class="p-val japan">¥${fmt(p.japan.totalJPY || p.japan.priceJPY)}</div>
        <div class="p-sub">${p.japan.shippingJPY ? `本体¥${fmt(p.japan.priceJPY)} + 送料¥${fmt(p.japan.shippingJPY)}` : (p.japan.sourceUrl ? '送料無料' : '&nbsp;')}</div>
        ${p.japan.sourceUrl ? `<div class="p-sub"><a href="${p.japan.sourceUrl}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none;font-size:9px;">출처 보기 ↗</a></div>` : ''}
        ${perMl ? `<div class="p-sub per-ml">${japanPerMl}</div>` : ''}
      </div>
      <div class="p-cell">
        <div class="p-label">차이 (엔화)</div>
        ${diffHtml}
      </div>
    </div>
    ${noteHtml}
  </div>`;
}

function render() {
  if (!rate || !products.length) return;
  const list = filtered();
  stats(list);
  const el = $('list');
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="em">🔍</div>조건에 맞는 위스키가 없습니다.</div>'; return; }
  el.innerHTML = list.map(card).join('');
}

// Events
$('search').addEventListener('input', e => { q = e.target.value.trim(); render(); });
$('filters').addEventListener('click', e => {
  const b = e.target.closest('.fbtn');
  if (!b) return;
  document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  cat = b.dataset.c;
  render();
});
$('sort').addEventListener('change', e => { srt = e.target.value; render(); });
$('onlySave').addEventListener('change', e => { onlySave = e.target.checked; render(); });
$('cmpTotal').addEventListener('click', () => { perMl=false; $('cmpTotal').classList.add('on'); $('cmpMl').classList.remove('on'); render(); });
$('cmpMl').addEventListener('click', () => { perMl=true; $('cmpMl').classList.add('on'); $('cmpTotal').classList.remove('on'); render(); });

// Init
(async () => { await loadData(); await loadRate(); })();
</script>
</body>
</html>
